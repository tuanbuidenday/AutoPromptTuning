use_wandb: False
dataset:
    name: 'dataset'
    records_path: null
    initial_dataset: ''
    label_schema: ["Yes", "No"]
    max_samples: 25
    semantic_sampling: False # Change to True in case you don't have M1. Currently there is an issue with faiss and M1

annotator:
    method : 'llm'
    config:
        llm:
            type: 'google'
            name: 'gemini-3.5-flash'  # Trọng tài / ground truth — mạnh hơn predictor để điểm không bị bias
        instruction: ''  # Leave empty: run_pipeline.py auto-fills it with the task_description you enter
        num_workers: 1
        prompt: 'prompts/predictor_completion/prediction.prompt'
        mini_batch_size: 5
        mode: 'annotation'

predictor:
    method : 'llm'
    config:
        llm:
            type: 'google'
            name: 'gemini-3.1-flash-lite'
#            async_params:
#                retry_interval: 10
#                max_retries: 2
        num_workers: 1
        prompt: 'prompts/predictor_completion/prediction.prompt'
        mini_batch_size: 5  #change to >1 if you want to include multiple samples in the one prompt
        mode: 'prediction'

meta_prompts:
    folder: 'prompts/meta_prompts_classification'
    num_err_prompt: 1  # Number of error examples per sample in the prompt generation
    num_err_samples: 2 # Number of error examples per sample in the sample generation
    history_length: 4 # Number of sample in the meta-prompt history
    num_generated_samples: 10 # Number of generated samples at each iteration
    num_initialize_samples: 15 # Number of generated samples at iteration 0, in zero-shot case
    samples_generation_batch: 10 # Number of samples generated in one call to the LLM
    num_workers: 1 #Number of parallel workers
    warmup: 4 # Number of warmup steps

eval:
    function_name: 'accuracy'
    num_large_errors: 4
    num_boundary_predictions : 0
    error_threshold: 0.5

llm:
    name: 'gemini-3.5-flash' # This is the meta-prompt LLM, it should be a strong model. For example, using GPT-3.5 will cause an error in many cases.
    type: 'google' # Can be OpenAI, Anthropic, Google, Azure
    temperature: 0.8

stop_criteria:
    max_usage: 2000000 #In $ in case of OpenAI models, otherwise number of tokens (Google counts tokens)
    patience: 10 # Number of patience steps
    min_delta: 0.01 # Delta for the improvement definition
